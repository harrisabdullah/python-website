<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Code Editor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #editor {
            width: 100%;
            height: 300px;
            border-radius: 6px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #output {
            width: 100%;
            height: 150px;
            background-color: #1e1e1e;
            color: #d4d4d4;
            padding: 10px;
            margin-top: 10px;
            border-radius: 4px;
            overflow-y: auto;
            font-family: monospace;
            white-space: pre-wrap;
        }
        button {
            margin-top: 10px;
            padding: 8px 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
    <!-- 1. Load MicroPython WASM wrapper module -->
    <script src="micropython/ports/webassembly/build-standard/micropython.mjs" type="module"></script>
</head>
<body>

    <h2>Python Code Editor</h2>
    
    <!-- Editor Container -->
    <div id="editor">def greet(name):
    print(f"Hello, {name}!")

greet("Developer")</div>

    <button onclick="runCode()">Run Code</button>

    <h3>Output:</h3>
    <pre id="output"></pre>

    <!-- Ace Editor CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ace.js" type="text/javascript" charset="utf-8"></script>
    
    <!-- 2. Load script.js as a module -->
    <script src="script.js" type="module"></script>
</body>
</html>
